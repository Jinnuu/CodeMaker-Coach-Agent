# Judge0 설정 (docker-compose의 judge0-* 서비스가 사용)
# 참고: https://github.com/judge0/judge0

# ── Postgres (judge0 전용 DB) ──────────────────
POSTGRES_HOST=judge0-db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=change_me_judge0

# ── Redis (judge0 전용) ────────────────────────
REDIS_HOST=judge0-redis
REDIS_PORT=6379

# ── 실행 제한 (보안: 기획 15장 / NFR-1) ─────────
CPU_TIME_LIMIT=5
CPU_EXTRA_TIME=1
WALL_TIME_LIMIT=10
MEMORY_LIMIT=128000
MAX_PROCESSES_AND_OR_THREADS=60
ENABLE_NETWORK=false

# ── 인증 토큰 (선택: .env 의 JUDGE0_AUTH_TOKEN 과 맞춤) ──
# AUTHN_TOKEN=
